<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
    <div class="box">
        <div class="items1">
            <div class="bar">
                <p class="Show-num" id="Show-num">0</p>
            </div>
        </div>
        <div class="Num-box">
        <div class="items2">
            <div onclick="shownum(7)" class="num">7</div>
            <div onclick="shownum(8)" class="num">8</div>
            <div onclick="shownum(9)" class="num">9</div>

            <div onclick="shownum('C')" class="num num1">C</div>

            <div onclick="shownum(4)" class="num">4</div>
            <div onclick="shownum(5)" class="num">5</div>
            <div onclick="shownum(6)" class="num">6</div>
            <div onclick="shownum('X')" class="num num3">X</div>
            <div onclick="shownum(1)" class="num">1</div>
            <div onclick="shownum(2)" class="num">2</div>
            <div onclick="shownum(3)" class="num">3</div>
            <div onclick="shownum('-')" class="num num3">-</div>
            <div onclick="shownum(0)" class="num">0</div>
            <div onclick="shownum('.')" class="num num3">.</div>
            <div onclick="shownum('=')" class="num num5">=</div>
            <div onclick="shownum('+')" class="num num3">+</div>
        </div>
        </div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
